<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты викторины к 8 Марта ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px;
        }
        
        .congrats {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .congrats h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ff4e4e 0%, #ff9a9a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .congrats p {
            font-size: 1.5rem;
            color: #444;
            line-height: 1.6;
        }
        
        .emoji-decoration {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .leaderboard {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 30px;
            padding: 30px;
            border: 3px solid white;
        }
        
        .leaderboard h2 {
            font-size: 2rem;
            color: #764ba2;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .leaderboard h2::before {
            content: "🏆";
            font-size: 2.2rem;
        }
        
        .leaderboard table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .leaderboard th {
            background: #764ba2;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .leaderboard td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 1.1rem;
        }
        
        .leaderboard tr:last-child td {
            border-bottom: none;
        }
        
        .leaderboard tr:hover {
            background: #f8f9fa;
        }
        
        .leaderboard .position {
            font-weight: bold;
            color: #764ba2;
            width: 60px;
            text-align: center;
        }
        
        .winner-row {
            background: #fff3bf;
            font-weight: bold;
        }
        
        .winner-row td:first-child {
            position: relative;
        }
        
        .winner-row td:first-child::before {
            content: "👑";
            position: absolute;
            left: -5px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }
        
        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 1rem;
        }
        
        .footer-note a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
        }
        
        .footer-note a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .congrats h1 {
                font-size: 2.5rem;
            }
            
            .congrats p {
                font-size: 1.2rem;
            }
            
            .leaderboard h2 {
                font-size: 1.6rem;
            }
            
            .leaderboard th,
            .leaderboard td {
                padding: 10px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="congrats">
            <div class="emoji-decoration">🌸🎉🌷🎊💐</div>
            <h1>С 8 МАРТА!</h1>
            <p>Дорогие девушки! Спасибо, что играли 💫</p>
            <p>Вот итоговая таблица лидеров:</p>
        </div>
        
        <div class="leaderboard">
            <h2>Таблица лидеров</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Имя</th>
                        <th>Время</th>
                        <th>Дата</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr><td colspan="4" style="text-align: center; padding: 30px;">Загрузка результатов...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer-note">
            💖 С праздником весны! 💖
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
        // ========== НАСТРОЙКИ FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyADjAXQh3yb3Gxndg7nwVPS_jtRN8U_QsI",
            authDomain: "memory-game-colleagues.firebaseapp.com",
            projectId: "memory-game-colleagues",
            storageBucket: "memory-game-colleagues.firebasestorage.app",
            messagingSenderId: "1099014304034",
            appId: "1:1099014304034:web:94eec524baed4bba4d757b"
        };
        
        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        // ========================================
        
        // DOM элемент
        const leaderboardBody = document.getElementById('leaderboardBody');
        
        // ========== ЗАГРУЗКА ТАБЛИЦЫ ЛИДЕРОВ ==========
        async function loadLeaderboard() {
            try {
                const snapshot = await db.collection('scores')
                    .orderBy('time', 'asc')
                    .limit(20)
                    .get();
                
                if (snapshot.empty) {
                    leaderboardBody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 30px;">Пока нет результатов</td></tr>';
                    return;
                }
                
                let html = '';
                let position = 1;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const date = data.timestamp?.toDate().toLocaleString('ru-RU', {
                        day: '2-digit',
                        month: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    }) || 'неизвестно';
                    
                    // Первое место с короной
                    const isWinner = position === 1;
                    
                    html += `
                        <tr ${isWinner ? 'class="winner-row"' : ''}>
                            <td class="position">${position}</td>
                            <td>${escapeHtml(data.name)} ${isWinner ? '👑' : ''}</td>
                            <td><strong>${data.time}с</strong></td>
                            <td>${date}</td>
                        </tr>
                    `;
                    position++;
                });
                leaderboardBody.innerHTML = html;
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                leaderboardBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: red; padding: 30px;">Ошибка загрузки результатов</td></tr>';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== ЗАПУСК ==========
        window.addEventListener('load', () => {
            loadLeaderboard();
        });
    </script>
</body>
</html>
